<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 - EBook电子书城</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <main class="auth">
      <section class="auth__panel card" aria-label="登录表单">
        <header class="brand">
          <figure class="brand__logo" aria-label="网站 Logo">
            <img src="../assets/logo.svg" alt="电子书城 Logo" width="42" height="42" />
          </figure>
          <div>
            <div class="brand__title"><span class="brand__welcome">欢迎登录</span> EBook电子书城</div>
          </div>
        </header>

        <section class="u-mt-18">
          <header>
            <h1>登录</h1>
          </header>

          <form action="./books.html" method="get">
            <div class="field">
              <label class="field__label" for="username">用户名</label>
              <input class="input" id="username" name="username" type="text" placeholder="请输入用户名" autocomplete="username" required />
            </div>

            <div class="field u-mt-12">
              <label class="field__label" for="password">密码</label>
              <input class="input" id="password" name="password" type="password" placeholder="请输入密码" autocomplete="current-password" required />
            </div>

            <div class="auth__actions">
              <label class="auth__checks" for="remember">
                <input id="remember" name="remember" type="checkbox" />
                Remember me
              </label>
              <a class="link" href="./login.html" aria-label="忘记密码入口">忘记密码？</a>
            </div>

            <div class="auth__cta">
              <button class="btn btn-primary" type="submit">登录</button>
              <a class="btn btn-secondary" href="./books.html">直接进入书城</a>
            </div>
          </form>
        </section>
      </section>
    </main>
  </body>
</html>
